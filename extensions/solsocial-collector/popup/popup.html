<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SolSocial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --paper:      #F4EEE1;
      --paper-deep: #EAE1CC;
      --paper-edge: #DDD2B7;
      --ink:        #171512;
      --ink-70:     #3A362E;
      --ink-40:     #7A7166;
      --ink-20:     #B6AD9D;
      --rule:       #C8BCA0;
      --ember:      #DC4B19;
      --sage:       #556A3D;
      --lapis:      #2C4A6B;
    }

    body {
      width: 320px;
      background: var(--paper);
      color: var(--ink);
      font-family: "IBM Plex Sans", ui-sans-serif, sans-serif;
      font-size: 13px;
      background-image: radial-gradient(ellipse at top, rgba(255,236,199,0.4), transparent 60%);
    }

    /* ─ Header ─ */
    .header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--rule);
      display: flex; align-items: center; gap: 10px;
    }
    .wordmark {
      font-family: "IBM Plex Mono", monospace;
      font-size: 15px; font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    .wordmark span { color: var(--ember); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    /* ─ Stream pulse ─ */
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      display: inline-block;
      background: var(--ink-20);
      transition: background 0.3s;
    }
    .pulse-dot.active {
      background: var(--sage);
      animation: pulse-ring 1.6s ease-out infinite;
    }
    .pulse-dot.error { background: var(--ember); }
    @keyframes pulse-ring {
      0%  { box-shadow: 0 0 0 0 rgba(85,106,61,0.5); }
      70% { box-shadow: 0 0 0 7px rgba(85,106,61,0); }
      100%{ box-shadow: 0 0 0 0 rgba(85,106,61,0); }
    }
    .stream-label {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; color: var(--ink-40);
    }
    .stream-label.active { color: var(--sage); }

    /* ─ Auth panel ─ */
    #auth-panel { padding: 16px; }
    .field { margin-bottom: 10px; }
    .field label {
      display: block; font-size: 10px;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--ink-40); margin-bottom: 5px;
    }
    .field input {
      width: 100%; padding: 7px 10px;
      background: var(--paper-deep);
      border: 1px solid var(--rule); border-radius: 3px;
      color: var(--ink); font-size: 13px;
      font-family: inherit; outline: none;
      transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--lapis); }
    .field-sm input { font-size: 11px; padding: 5px 8px; }

    .btn {
      width: 100%; padding: 8px;
      background: var(--ink); color: var(--paper);
      border: none; border-radius: 3px;
      font-size: 13px; font-weight: 600;
      font-family: inherit; cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--ember); }
    .btn:disabled { background: var(--ink-20); color: var(--paper); cursor: not-allowed; }
    .btn-outline {
      background: transparent; color: var(--ink-40);
      border: 1px solid var(--rule);
    }
    .btn-outline:hover { background: var(--paper-deep); color: var(--ink); }
    .btn-danger { background: transparent; color: var(--ember); border: 1px solid var(--ember); }
    .btn-danger:hover { background: var(--ember); color: var(--paper); }

    .error-msg { color: var(--ember); font-size: 11px; margin-top: 6px; min-height: 14px; }

    /* ─ Status panel ─ */
    #status-panel { padding: 14px 16px; display: none; }

    .user-row {
      display: flex; align-items: center; gap: 10px;
      padding-bottom: 12px; margin-bottom: 12px;
      border-bottom: 1px solid var(--rule);
    }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--paper-edge);
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; font-size: 13px; color: var(--ink-70);
      flex-shrink: 0;
    }
    .user-name { font-weight: 600; font-size: 13px; }
    .user-email { font-size: 10px; color: var(--ink-40); margin-top: 1px; }

    /* ─ Stats ─ */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 12px;
    }
    .stat {
      padding: 8px 10px;
      background: var(--paper-deep);
      border: 1px solid var(--rule); border-radius: 3px;
    }
    .stat-val {
      font-family: "IBM Plex Mono", monospace;
      font-size: 22px; font-weight: 500; line-height: 1;
      color: var(--ink);
    }
    .stat-label {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: .07em; color: var(--ink-40); margin-top: 3px;
    }

    /* ─ Stream status bar ─ */
    .stream-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; margin-bottom: 10px;
      background: var(--paper-deep); border: 1px solid var(--rule);
      border-radius: 3px;
    }
    .stream-bar.active { border-color: var(--sage); background: rgba(85,106,61,0.06); }
    .stream-info { flex: 1; }
    .stream-title { font-size: 11px; font-weight: 600; }
    .stream-sub { font-family: "IBM Plex Mono", monospace; font-size: 9px; color: var(--ink-40); margin-top: 2px; }

    /* ─ Platform breakdown ─ */
    .platforms { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
    .platform-pill {
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px; padding: 2px 8px; border-radius: 2px;
      border: 1px solid var(--rule); color: var(--ink-40);
      background: var(--paper-deep);
    }
    .platform-pill.li { border-color: #0A66C280; color: #0A66C2; background: #0A66C210; }
    .platform-pill.x  { border-color: #00000040; color: var(--ink-70); background: var(--paper-edge); }

    /* ─ Toggle ─ */
    .toggle-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 10px;
    }
    .toggle-label { font-size: 12px; }
    .toggle {
      width: 34px; height: 18px; border-radius: 9px;
      background: var(--ink-20); cursor: pointer;
      border: none; position: relative; transition: background 0.2s;
    }
    .toggle.on { background: var(--sage); }
    .toggle::after {
      content: ""; position: absolute;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--paper); top: 3px; left: 3px;
      transition: left 0.2s;
    }
    .toggle.on::after { left: 19px; }

    /* ─ Actions ─ */
    .actions { display: flex; flex-direction: column; gap: 5px; }

    .divider { border: none; border-top: 1px solid var(--rule); margin: 10px 0; }

    .open-app-btn {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 7px; width: 100%;
      background: var(--lapis); color: var(--paper);
      border: none; border-radius: 3px; cursor: pointer;
      font-size: 12px; font-weight: 600; font-family: inherit;
      text-decoration: none; transition: opacity 0.15s;
    }
    .open-app-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="header">
    <div class="wordmark">Sol<span>Social</span></div>
    <div class="header-right">
      <span class="pulse-dot" id="pulse"></span>
      <span class="stream-label" id="stream-label">—</span>
    </div>
  </div>

  <!-- Sign-in -->
  <div id="auth-panel">
    <p style="font-size:12px; color:var(--ink-40); margin-bottom:14px; line-height:1.5;">
      Sign in to start collecting posts, comments, and engagement data from your feeds.
    </p>
    <div class="field field-sm" style="margin-bottom:10px;">
      <label>Backend URL</label>
      <input type="text" id="base-url" value="http://localhost:51734" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" autocomplete="email" placeholder="you@example.com" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" />
    </div>
    <button class="btn" id="signin-btn">Sign in to SolSocial</button>
    <div class="error-msg" id="auth-error"></div>
  </div>

  <!-- Status -->
  <div id="status-panel">
    <div class="user-row">
      <div class="avatar" id="avatar">?</div>
      <div>
        <div class="user-name" id="display-name">—</div>
        <div class="user-email" id="display-email">—</div>
      </div>
    </div>

    <!-- Stream status bar -->
    <div class="stream-bar" id="stream-bar">
      <span class="pulse-dot" id="stream-dot"></span>
      <div class="stream-info">
        <div class="stream-title" id="stream-title">Collector status</div>
        <div class="stream-sub" id="stream-sub">—</div>
      </div>
      <button class="toggle" id="toggle-btn"></button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="today-count">0</div>
        <div class="stat-label">Today</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="total-count">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="queue-size">0</div>
        <div class="stat-label">Queued</div>
      </div>
    </div>

    <!-- Platform breakdown -->
    <div class="platforms" id="platform-pills"></div>

    <!-- Type breakdown — what we captured most recently -->
    <div id="type-breakdown" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 4px;"></div>

    <hr class="divider" />

    <!-- Live scanner telemetry on the active tab -->
    <div id="scanner-panel" style="margin-bottom: 10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-40); margin-bottom:4px; font-weight:600;">
        <span>active tab</span>
        <button id="scan-btn" class="btn-link" style="background:none;border:none;cursor:pointer;font-size:10px;color:var(--lapis);text-decoration:underline;">scan now ↻</button>
      </div>
      <div id="scanner-line" class="mono" style="font-size:11px; color:var(--ink-70); line-height:1.5;">—</div>
      <div id="scanner-warn" style="font-size:11px; color:var(--ember); margin-top:4px;"></div>
    </div>

    <hr class="divider" />

    <!-- Actions -->
    <div class="actions" style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
      <a class="btn-primary" id="open-app" href="http://localhost:51835/intelligence" target="_blank" style="text-decoration:none;text-align:center;padding:8px;border-radius:4px;background:var(--ember);color:white;font-size:12px;font-weight:600;">
        Feed ↗
      </a>
      <button class="btn-primary" id="flush-btn" style="padding:8px;border-radius:4px;background:var(--paper-deep);border:1px solid var(--rule);color:var(--ink);font-size:12px;cursor:pointer;">
        Flush queue
      </button>
    </div>

    <hr class="divider" />

    <!-- AI recommendations panel -->
    <div id="ai-panel" style="margin-bottom:10px;">
      <div style="display:flex; justify-content:space-between; align-items:center; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; color:var(--ink-40); margin-bottom:6px; font-weight:600;">
        <span>AI assist</span>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
        <button id="rec-posts" class="btn-link" style="padding:6px;border-radius:4px;background:var(--paper-deep);border:1px solid var(--rule);font-size:11px;cursor:pointer;">Post ideas</button>
        <button id="rec-articles" class="btn-link" style="padding:6px;border-radius:4px;background:var(--paper-deep);border:1px solid var(--rule);font-size:11px;cursor:pointer;">Articles for me</button>
      </div>
      <div id="rec-output" style="margin-top:8px; font-size:11px; color:var(--ink-70); line-height:1.5; max-height:180px; overflow:auto;"></div>
    </div>

    <hr class="divider" />

    <!-- Footer -->
    <div class="actions" style="display:flex; justify-content:space-between; align-items:center;">
      <label style="font-size:10px; color:var(--ink-40); display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="checkbox" id="debug-toggle" /> debug logs
      </label>
      <button class="btn-link" id="signout-btn" style="background:none;border:none;color:var(--ink-40);font-size:10px;cursor:pointer;text-decoration:underline;">sign out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
