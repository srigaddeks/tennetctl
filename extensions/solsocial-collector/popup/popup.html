<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SolSocial Collector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #060b17;
      color: #dde5f4;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 10px;
      border-bottom: 1px solid #1c2e45;
    }
    .header .logo {
      width: 28px; height: 28px;
      background: #2d7ef7;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .header h1 { font-size: 14px; font-weight: 600; color: #dde5f4; }
    .header .version { font-size: 11px; color: #3a5075; margin-left: auto; }

    /* ─── Auth form ─── */
    #auth-panel { padding: 16px; }
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #7a92b8; margin-bottom: 5px; }
    .field input {
      width: 100%; padding: 7px 10px;
      background: #0b1523; border: 1px solid #1c2e45;
      border-radius: 5px; color: #dde5f4; font-size: 13px;
      outline: none;
    }
    .field input:focus { border-color: #2d7ef7; }
    .field-small { margin-bottom: 6px; }
    .field-small label { font-size: 10px; color: #3a5075; margin-bottom: 3px; }
    .field-small input { padding: 5px 8px; font-size: 12px; }

    .btn {
      width: 100%; padding: 8px;
      background: #2d7ef7; color: #fff;
      border: none; border-radius: 5px;
      font-size: 13px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
    }
    .btn:hover { background: #5596ff; }
    .btn:disabled { background: #0d1f3c; color: #3a5075; cursor: not-allowed; }
    .btn-danger { background: #1f0508; color: #ff3f55; border: 1px solid #ff3f55; }
    .btn-danger:hover { background: #ff3f55; color: #fff; }

    .error { color: #ff3f55; font-size: 12px; margin-top: 6px; min-height: 16px; }

    /* ─── Status panel ─── */
    #status-panel { padding: 14px 16px; display: none; }

    .user-row {
      display: flex; align-items: center; gap: 8px;
      padding-bottom: 12px; border-bottom: 1px solid #1c2e45; margin-bottom: 12px;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: #0d1f3c; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #2d7ef7;
    }
    .user-info { flex: 1; }
    .user-name { font-weight: 600; font-size: 13px; }
    .user-email { font-size: 11px; color: #7a92b8; }

    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .stat {
      background: #0b1523; border: 1px solid #1c2e45; border-radius: 6px;
      padding: 8px 10px;
    }
    .stat-value { font-size: 20px; font-weight: 700; color: #2d7ef7; font-family: "SF Mono", monospace; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: #7a92b8; margin-top: 2px; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .toggle-label { font-size: 13px; }
    .toggle {
      width: 36px; height: 20px; border-radius: 10px;
      background: #1c2e45; cursor: pointer; position: relative;
      border: none; transition: background .2s;
    }
    .toggle.on { background: #2d7ef7; }
    .toggle::after {
      content: ""; position: absolute;
      width: 14px; height: 14px; border-radius: 50%;
      background: #fff; top: 3px; left: 3px; transition: left .2s;
    }
    .toggle.on::after { left: 19px; }

    .platforms { display: flex; gap: 6px; margin-bottom: 12px; }
    .platform-pill {
      font-size: 10px; text-transform: uppercase; letter-spacing: .04em;
      padding: 3px 8px; border-radius: 10px;
      background: #0d1f3c; color: #7a92b8; border: 1px solid #1c2e45;
    }
    .platform-pill.active { background: #051a12; color: #00c47a; border-color: #00c47a; }

    .btn-sm { font-size: 12px; padding: 6px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">S</div>
    <h1>SolSocial Collector</h1>
    <span class="version">v0.1</span>
  </div>

  <!-- Sign-in form -->
  <div id="auth-panel">
    <div class="field-small" style="margin-bottom:10px;">
      <label>Backend URL</label>
      <input type="text" id="base-url" value="http://localhost:51734" placeholder="https://your-tennetctl.app" />
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="signin-btn">Sign in</button>
    <div class="error" id="auth-error"></div>
  </div>

  <!-- Status panel -->
  <div id="status-panel">
    <div class="user-row">
      <div class="avatar" id="avatar">👤</div>
      <div class="user-info">
        <div class="user-name" id="display-name">—</div>
        <div class="user-email" id="display-email">—</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="today-count">0</div>
        <div class="stat-label">Captured today</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="queue-size">0</div>
        <div class="stat-label">In queue</div>
      </div>
    </div>

    <div class="toggle-row">
      <span class="toggle-label">Collection active</span>
      <button class="toggle" id="toggle-btn"></button>
    </div>

    <div class="platforms">
      <div class="platform-pill active" id="pill-linkedin">LinkedIn</div>
      <div class="platform-pill active" id="pill-twitter">Twitter / X</div>
    </div>

    <button class="btn btn-sm" id="flush-btn" style="margin-bottom:8px;">Flush queue now</button>
    <button class="btn btn-sm btn-danger" id="signout-btn">Sign out</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
