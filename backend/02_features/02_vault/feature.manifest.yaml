apiVersion: tennetctl/v1
kind: Feature

metadata:
  key: vault
  number: 2
  module: vault
  always_on: false
  label: Vault
  description: Secret storage with AES-256-GCM envelope encryption. Backs auth secrets, signing keys, Argon2 pepper, OAuth client creds, third-party API tokens. See ADR-028.
  manifest_version: 1

spec:
  depends_on_modules: []

  sub_features:
    - key: vault.secrets
      number: 1
      label: Secrets
      description: CRUD + rotate for envelope-encrypted secrets. Values stored as ciphertext + wrapped-DEK + nonce; plaintext is decrypted in-process via VaultClient.
      owns:
        schema: "02_vault"
        tables:
          - "10_fct_vault_entries"
          - "01_dim_entity_types"
          - "20_dtl_attr_defs"
          - "21_dtl_attrs"
        views: ["v_vault_entries"]
        seeds: []
      nodes:
        - key: vault.secrets.put
          kind: effect
          handler: sub_features.01_secrets.nodes.vault_secrets_put.VaultSecretsPut
          label: Put Secret
          description: Creates a new envelope-encrypted secret at version=1; emits audit vault.secrets.created atomically with the write.
          emits_audit: true
          version: 1
          tags: [vault, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: vault.secrets.get
          kind: request
          handler: sub_features.01_secrets.nodes.vault_secrets_get.VaultSecretsGet
          label: Get Secret
          description: Read plaintext via the in-process SWR cache. Does NOT emit audit — the node is the hot path; the HTTP GET /v1/vault/{key} admin route is the audited surface.
          emits_audit: false
          version: 1
          tags: [vault, read]
          execution:
            timeout_ms: 2000
            retries: 0
            tx: none
        - key: vault.secrets.rotate
          kind: effect
          handler: sub_features.01_secrets.nodes.vault_secrets_rotate.VaultSecretsRotate
          label: Rotate Secret
          description: Creates a new (key, version+1) row under a fresh DEK; emits audit vault.secrets.rotated; invalidates the cache.
          emits_audit: true
          version: 1
          tags: [vault, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: vault.secrets.delete
          kind: effect
          handler: sub_features.01_secrets.nodes.vault_secrets_delete.VaultSecretsDelete
          label: Delete Secret
          description: Soft-deletes every version of a key; emits audit vault.secrets.deleted; invalidates the cache.
          emits_audit: true
          version: 1
          tags: [vault, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
      routes:
        - method: GET
          path: /v1/vault
          handler: sub_features.01_secrets.routes.list_secrets_route
        - method: POST
          path: /v1/vault
          handler: sub_features.01_secrets.routes.create_secret_route
        - method: POST
          path: "/v1/vault/{key}/rotate"
          handler: sub_features.01_secrets.routes.rotate_secret_route
        - method: DELETE
          path: "/v1/vault/{key}"
          handler: sub_features.01_secrets.routes.delete_secret_route
      ui_pages: []

    - key: vault.configs
      number: 2
      label: Configs
      description: Plaintext typed configuration values (boolean / string / number / json) scoped to global / org / workspace. Unlike secrets, configs are viewable + editable.
      owns:
        schema: "02_vault"
        tables: ["11_fct_vault_configs", "03_dim_value_types"]
        views: ["v_vault_configs"]
        seeds: []
      nodes:
        - key: vault.configs.create
          kind: effect
          handler: sub_features.02_configs.nodes.vault_configs_create.VaultConfigsCreate
          label: Create Config
          description: Creates a typed plaintext config at (scope, org_id, workspace_id, key); emits audit vault.configs.created.
          emits_audit: true
          version: 1
          tags: [vault, config, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: vault.configs.get
          kind: control
          handler: sub_features.02_configs.nodes.vault_configs_get.VaultConfigsGet
          label: Get Config
          description: Read-only lookup by id. Returns flat v_vault_configs row or None.
          emits_audit: false
          version: 1
          tags: [vault, config, read]
          execution:
            timeout_ms: 2000
            retries: 0
            tx: caller
        - key: vault.configs.update
          kind: effect
          handler: sub_features.02_configs.nodes.vault_configs_update.VaultConfigsUpdate
          label: Update Config
          description: PATCH value / description / is_active. Value type-checked against declared value_type. Emits audit vault.configs.updated.
          emits_audit: true
          version: 1
          tags: [vault, config, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: vault.configs.delete
          kind: effect
          handler: sub_features.02_configs.nodes.vault_configs_delete.VaultConfigsDelete
          label: Delete Config
          description: Soft-delete by id. Emits audit vault.configs.deleted.
          emits_audit: true
          version: 1
          tags: [vault, config, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
      routes:
        - method: GET
          path: /v1/vault-configs
          handler: sub_features.02_configs.routes.list_configs_route
        - method: POST
          path: /v1/vault-configs
          handler: sub_features.02_configs.routes.create_config_route
        - method: GET
          path: "/v1/vault-configs/{config_id}"
          handler: sub_features.02_configs.routes.get_config_route
        - method: PATCH
          path: "/v1/vault-configs/{config_id}"
          handler: sub_features.02_configs.routes.update_config_route
        - method: DELETE
          path: "/v1/vault-configs/{config_id}"
          handler: sub_features.02_configs.routes.delete_config_route
      ui_pages: []
