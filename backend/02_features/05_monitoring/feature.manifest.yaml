          tags: [monitoring, escalation, policies]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: monitoring.escalation.policy_delete
          kind: effect
          handler: sub_features.08_escalation.nodes.policy_delete.PolicyDelete
          label: Delete Escalation Policy
          description: Soft-deletes an escalation policy. Fails with 409 if referenced by active alert rules.
          emits_audit: true
          version: 1
          tags: [monitoring, escalation, policies]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: monitoring.escalation.advance
          kind: effect
          handler: sub_features.08_escalation.nodes.escalate.AdvanceEscalation
          label: Advance Escalation State
          description: Worker entry point - loads policy step, resolves recipient, sends notification, advances to next step.
          emits_audit: true
          version: 1
          tags: [monitoring, escalation, worker]
          execution:
            timeout_ms: 10000
            retries: 0
            tx: own
        - key: monitoring.escalation.resolve_oncall
          kind: control
          handler: sub_features.08_escalation.nodes.resolve_oncall.ResolveOncall
          label: Resolve On-Call User
          description: Determines who is currently on-call for a schedule using rotation math.
          emits_audit: false
          version: 1
          tags: [monitoring, escalation, oncall]
          execution:
            timeout_ms: 1000
            retries: 0
            tx: none
