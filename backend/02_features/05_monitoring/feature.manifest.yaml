      description: "SLO definitions with target attainment, error budget tracking, and multi-window burn rate (Google SRE model). Evaluator worker computes attainment/budget/burn rates every 60s and emits synthetic alerts when burn thresholds crossed, reusing the alert→incident→escalation chain."
