    - key: monitoring.actions
      number: 9
      label: Action Templates
      description: "Reusable parameterized action templates for webhooks, email, and Slack. Jinja2 sandboxed rendering with HMAC-SHA256 signing. Retry with exponential backoff. Delivery audit log."
      owns:
        schema: "05_monitoring"
        tables:
          - "03_dim_monitoring_action_kind"
          - "14_fct_monitoring_action_templates"
          - "65_evt_monitoring_action_deliveries"
        views:
          - "v_monitoring_action_templates"
          - "v_monitoring_action_deliveries"
      nodes:
        - key: monitoring.actions.template_create
          kind: effect
          handler: sub_features.09_action_templates.nodes.template_create.TemplateCreate
          label: Create Action Template
          description: Create a new action template with Jinja2 body. Validates syntax at create-time. Emits audit.
          emits_audit: true
          version: 1
          tags: [monitoring, actions]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: monitoring.actions.template_update
          kind: effect
          handler: sub_features.09_action_templates.nodes.template_update.TemplateUpdate
          label: Update Action Template
          description: Update action template fields. Validates body syntax if changed. Emits audit.
          emits_audit: true
          version: 1
          tags: [monitoring, actions]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: monitoring.actions.template_delete
          kind: effect
          handler: sub_features.09_action_templates.nodes.template_delete.TemplateDelete
          label: Delete Action Template
          description: Soft-delete an action template. Emits audit.
          emits_audit: true
          version: 1
          tags: [monitoring, actions]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: monitoring.actions.render
          kind: control
          handler: sub_features.09_action_templates.nodes.render.RenderTemplate
          label: Render Action Template
          description: Pure control node - render template with variables. No I/O.
          emits_audit: false
          version: 1
          tags: [monitoring, actions]
          execution:
            timeout_ms: 500
            retries: 0
            tx: none
        - key: monitoring.actions.dispatch
          kind: effect
          handler: sub_features.09_action_templates.nodes.dispatch.DispatchAction
          label: Dispatch Action
          description: Dispatch a rendered action (webhook/email/Slack). Updates delivery record. Worker-owned; tx=own.
          emits_audit: true
          version: 1
          tags: [monitoring, actions]
          execution:
            timeout_ms: 15000
            retries: 0
            tx: own
      routes:
        - method: GET
          path: /v1/monitoring/action-templates
          handler: sub_features.09_action_templates.routes.list_action_templates
        - method: POST
          path: /v1/monitoring/action-templates
          handler: sub_features.09_action_templates.routes.create_action_template
        - method: GET
          path: "/v1/monitoring/action-templates/{template_id}"
          handler: sub_features.09_action_templates.routes.get_action_template
        - method: PATCH
          path: "/v1/monitoring/action-templates/{template_id}"
          handler: sub_features.09_action_templates.routes.update_action_template
        - method: DELETE
          path: "/v1/monitoring/action-templates/{template_id}"
          handler: sub_features.09_action_templates.routes.delete_action_template
        - method: POST
          path: "/v1/monitoring/action-templates/{template_id}/test"
          handler: sub_features.09_action_templates.routes.test_action_template
        - method: GET
          path: /v1/monitoring/action-deliveries
          handler: sub_features.09_action_templates.routes.list_action_deliveries
      ui_pages: []

    - key: monitoring.incidents
      number: 10
      label: Incidents
      description: "Incident aggregation layer above alerts. Groups firing alerts into durable incidents using configurable strategies (fingerprint, label_set, custom_key). State machine: open → acknowledged → resolved → closed. Escalation and actions fire at incident granularity."
      owns:
        schema: "05_monitoring"
        tables:
          - "01_dim_incident_state"
          - "02_dim_incident_event_kind"
          - "10_fct_monitoring_incidents"
          - "40_lnk_monitoring_incident_alerts"
          - "60_evt_monitoring_incident_timeline"
          - "20_dtl_monitoring_incident_grouping_rules"
        views:
          - "v_monitoring_incidents"
      nodes:
        - key: monitoring.incidents.group
          kind: effect
          handler: sub_features.10_incidents.nodes.group.GroupAlert
          label: Group Alert into Incident
          description: Create or join alert to incident using configurable dedup strategy. Worker entry point. Emits audit.
          emits_audit: true
          version: 1
          tags: [monitoring, incidents, grouping, worker]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: own
        - key: monitoring.incidents.transition
          kind: effect
          handler: sub_features.10_incidents.nodes.transition.TransitionIncident
          label: Incident State Transition
          description: Change incident state (acknowledged, resolved, closed). Emits audit and timeline event.
          emits_audit: true
          version: 1
          tags: [monitoring, incidents, state]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: monitoring.incidents.comment_add
          kind: effect
          handler: sub_features.10_incidents.nodes.comment_add.AddIncidentComment
          label: Add Incident Comment
          description: Add user comment to incident timeline. Emits audit and timeline event.
          emits_audit: true
          version: 1
          tags: [monitoring, incidents, comments]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
      routes:
        - method: GET
          path: /v1/monitoring/incidents
          handler: sub_features.10_incidents.routes.list_incidents_route
        - method: POST
          path: /v1/monitoring/incidents
          handler: sub_features.10_incidents.routes.list_incidents_route
        - method: GET
          path: "/v1/monitoring/incidents/{id}"
          handler: sub_features.10_incidents.routes.get_incident_route
        - method: PATCH
          path: "/v1/monitoring/incidents/{id}"
          handler: sub_features.10_incidents.routes.update_incident_route
        - method: POST
          path: "/v1/monitoring/incidents/{id}/comments"
          handler: sub_features.10_incidents.routes.add_incident_comment_route
        - method: GET
          path: "/v1/monitoring/incidents/{id}/timeline"
          handler: sub_features.10_incidents.routes.get_incident_timeline_route
        - method: POST
          path: "/v1/monitoring/alert-rules/{id}/grouping"
          handler: sub_features.10_incidents.routes.create_grouping_rule_route
        - method: GET
          path: "/v1/monitoring/alert-rules/{id}/grouping"
          handler: sub_features.10_incidents.routes.get_grouping_rule_route
      ui_pages:
        - path: "/monitoring/incidents"
          label: Incidents
        - path: "/monitoring/incidents/[id]"
          label: Incident Detail

