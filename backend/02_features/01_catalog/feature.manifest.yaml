apiVersion: tennetctl/v1
kind: Feature

metadata:
  key: core
  number: 1
  module: core
  always_on: true
  label: Node Catalog & Flows
  description: Node registry, flow definitions, and DAG versioning
  manifest_version: 1

spec:
  depends_on_modules: []

  sub_features:
    - key: core.nodes
      number: 1
      label: Node Catalog
      description: Node registry and metadata
      owns:
        schema: "01_catalog"
        tables: []
        views: []
        seeds: []
      nodes: []

    - key: core.flows
      number: 2
      label: Flows
      description: DAG definitions and versioning
      owns:
        schema: "01_catalog"
        tables: []
        views: []
        seeds: []
      nodes: []
      routes:
      - method: GET
        path: "/v1/flows"
        description: "List flows"
        auth_required: true
      - method: POST
        path: "/v1/flows"
        description: "Create flow"
        auth_required: true
      - method: GET
        path: "/v1/flows/{id}"
        description: "Get flow"
        auth_required: true
      - method: PATCH
        path: "/v1/flows/{id}"
        description: "Update flow (rename, archive, publish)"
        auth_required: true
      - method: DELETE
        path: "/v1/flows/{id}"
        description: "Soft-delete flow"
        auth_required: true
      - method: GET
        path: "/v1/flows/{id}/versions/{version_id}"
        description: "Get flow version with DAG"
        auth_required: true
      - method: PATCH
        path: "/v1/flows/{id}/versions/{version_id}"
        description: "Update draft version DAG"
        auth_required: true
