apiVersion: tennetctl/v1
kind: Feature

metadata:
  key: iam
  number: 3
  module: iam
  always_on: true
  label: Identity & Access Management
  description: Orgs, workspaces, users, roles, groups, scopes, applications. Always on; tenant-boundary foundation for every other feature.
  manifest_version: 1

spec:
  depends_on_modules: []

  sub_features:
    - key: iam.orgs
      number: 1
      label: Organisations
      description: Tenant boundaries and org identity. Top-level resource; everything else is scoped under an org.
      owns:
        schema: "03_iam"
        tables: ["10_fct_orgs"]
        views: ["v_orgs"]
        seeds: []
      nodes:
        - key: iam.orgs.create
          kind: effect
          handler: sub_features.01_orgs.nodes.iam_orgs_create.OrgsCreate
          label: Create Organization
          description: Creates an org with slug + display_name; emits audit iam.orgs.created atomically with the fct + dtl writes.
          emits_audit: true
          version: 1
          tags: [identity, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: iam.orgs.get
          kind: control
          handler: sub_features.01_orgs.nodes.iam_orgs_get.OrgsGet
          label: Get Organization (v1, deprecated)
          description: "DEPRECATED — replaced by iam.orgs.get_v2 on 2026-04-20 (Plan 39-03). Read-only cross-sub-feature lookup for tenant scope validation; returns flat v_orgs row or None. Does not emit audit (kind=control). See ADR-032 for the v1→v2 migration recipe."
          emits_audit: false
          version: 1
          tags: [identity, read, deprecated, replaced_by=iam.orgs.get_v2]
          deprecated_at: 2026-04-20T00:00:00Z
          execution:
            timeout_ms: 2000
            retries: 0
            tx: caller
        - key: iam.orgs.get_v2
          kind: control
          handler: sub_features.01_orgs.nodes.iam_orgs_get_v2.OrgsGetV2
          label: Get Organization (v2)
          description: Read-only cross-sub-feature lookup returning {org, workspace_count}. First real v1→v2 migration (Plan 39-03, ADR-032). Does not emit audit (kind=control).
          emits_audit: false
          version: 2
          tags: [identity, read, replaces=iam.orgs.get]
          execution:
            timeout_ms: 2000
            retries: 0
            tx: caller
      routes:
        - method: GET
          path: /v1/orgs
          handler: sub_features.01_orgs.routes.list_orgs_route
        - method: POST
          path: /v1/orgs
          handler: sub_features.01_orgs.routes.create_org_route
        - method: GET
          path: "/v1/orgs/{id}"
          handler: sub_features.01_orgs.routes.get_org_route
        - method: PATCH
          path: "/v1/orgs/{id}"
          handler: sub_features.01_orgs.routes.update_org_route
        - method: DELETE
          path: "/v1/orgs/{id}"
          handler: sub_features.01_orgs.routes.delete_org_route
      ui_pages: []

    - key: iam.workspaces
      number: 2
      label: Workspaces
      description: Scoped work containers within an org. Slug unique per (org_id, slug).
      owns:
        schema: "03_iam"
        tables: ["11_fct_workspaces"]
        views: ["v_workspaces"]
        seeds: []
      nodes:
        - key: iam.workspaces.create
          kind: effect
          handler: sub_features.02_workspaces.nodes.iam_workspaces_create.WorkspacesCreate
          label: Create Workspace
          description: Validates parent org exists, enforces per-org slug uniqueness, creates workspace + display_name attr, emits audit iam.workspaces.created.
          emits_audit: true
          version: 1
          tags: [identity, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: iam.workspaces.get
          kind: control
          handler: sub_features.02_workspaces.nodes.iam_workspaces_get.WorkspacesGet
          label: Get Workspace
          description: Read-only cross-sub-feature lookup; returns flat v_workspaces row or None.
          emits_audit: false
          version: 1
          tags: [identity, read]
          execution:
            timeout_ms: 2000
            retries: 0
            tx: caller
      routes:
        - method: GET
          path: /v1/workspaces
          handler: sub_features.02_workspaces.routes.list_workspaces_route
        - method: POST
          path: /v1/workspaces
          handler: sub_features.02_workspaces.routes.create_workspace_route
        - method: GET
          path: "/v1/workspaces/{id}"
          handler: sub_features.02_workspaces.routes.get_workspace_route
        - method: PATCH
          path: "/v1/workspaces/{id}"
          handler: sub_features.02_workspaces.routes.update_workspace_route
        - method: DELETE
          path: "/v1/workspaces/{id}"
          handler: sub_features.02_workspaces.routes.delete_workspace_route
      ui_pages: []

    - key: iam.users
      number: 3
      label: Users
      description: Human and service identities. Shared EAV infra (dim_entity_types, dtl_attr_defs, dtl_attrs) lives in the feature-level 03_iam/00_bootstrap migration, not under any one sub-feature.
      owns:
        schema: "03_iam"
        tables: ["12_fct_users"]
        views: ["v_users"]
        seeds: []
      nodes:
        - key: iam.users.create
          kind: effect
          handler: sub_features.03_users.nodes.iam_users_create.UsersCreate
          label: Create User
          description: Creates a user with account_type + email/display_name/avatar_url; emits audit iam.users.created.
          emits_audit: true
          version: 1
          tags: [identity, write]
          execution:
            timeout_ms: 5000
            retries: 0
            tx: caller
        - key: iam.users.get
          kind: control
          handler: sub_features.03_users.nodes.iam_users_get.UsersGet
          label: Get User
          description: Read-only cross-sub-feature lookup; returns flat v_users row or None.
          emits_audit: false
          version: 1
          tags: [identity, read]
          execution:
            timeout_ms: 2000
            retries: 0
            tx: caller
      routes:
        - method: GET
          path: /v1/users
          handler: sub_features.03_users.routes.list_users_route
        - method: POST
          path: /v1/users
          handler: sub_features.03_users.routes.create_user_route
        - method: GET
          path: "/v1/users/{id}"
          handler: sub_features.03_users.routes.get_user_route
        - method: PATCH
          path: "/v1/users/{id}"
          handler: sub_features.03_users.routes.update_user_route
        - method: DELETE
          path: "/v1/users/{id}"
          handler: sub_features.03_users.routes.delete_user_route
      ui_pages: []

    - key: iam.roles
      number: 4
      label: Roles & Scopes
      description: Named permission bundles. Roles carry scope grants via lnk_role_scopes. Global (org_id NULL) and org-scoped roles both live here. Shared dim_scopes + dim_role_types live in the feature-level bootstrap.
      owns:
        schema: "03_iam"
        tables:
          - "13_fct_roles"
          - "42_lnk_user_roles"
          - "44_lnk_role_scopes"
        views: ["v_roles"]
        seeds: []
      nodes:
        - key: iam.roles.create
          kind: effect
          handler: sub_features.04_roles.nodes.iam_roles_create.RolesCreate
          label: Create Role
          description: Creates a role (global or org-scoped) with EAV code/label/description; emits audit iam.roles.created.
          emits_audit: true
          version: 1
          tags: [identity, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.roles.get
          kind: control
          handler: sub_features.04_roles.nodes.iam_roles_get.RolesGet
          label: Get Role
          description: Read-only cross-sub-feature lookup; returns flat v_roles row or None.
          emits_audit: false
          version: 1
          tags: [identity, read]
          execution: {timeout_ms: 2000, retries: 0, tx: caller}
      routes:
        - method: GET
          path: /v1/roles
          handler: sub_features.04_roles.routes.list_roles_route
        - method: POST
          path: /v1/roles
          handler: sub_features.04_roles.routes.create_role_route
        - method: GET
          path: "/v1/roles/{id}"
          handler: sub_features.04_roles.routes.get_role_route
        - method: PATCH
          path: "/v1/roles/{id}"
          handler: sub_features.04_roles.routes.update_role_route
        - method: DELETE
          path: "/v1/roles/{id}"
          handler: sub_features.04_roles.routes.delete_role_route
      ui_pages: []

    - key: iam.groups
      number: 5
      label: Groups
      description: User collections for bulk role assignment. Always org-scoped.
      owns:
        schema: "03_iam"
        tables: ["14_fct_groups", "43_lnk_user_groups"]
        views: ["v_groups"]
        seeds: []
      nodes:
        - key: iam.groups.create
          kind: effect
          handler: sub_features.05_groups.nodes.iam_groups_create.GroupsCreate
          label: Create Group
          description: Creates org-scoped group with EAV code/label/description; emits audit iam.groups.created.
          emits_audit: true
          version: 1
          tags: [identity, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.groups.get
          kind: control
          handler: sub_features.05_groups.nodes.iam_groups_get.GroupsGet
          label: Get Group
          description: Read-only cross-sub-feature lookup; returns flat v_groups row or None.
          emits_audit: false
          version: 1
          tags: [identity, read]
          execution: {timeout_ms: 2000, retries: 0, tx: caller}
      routes:
        - method: GET
          path: /v1/groups
          handler: sub_features.05_groups.routes.list_groups_route
        - method: POST
          path: /v1/groups
          handler: sub_features.05_groups.routes.create_group_route
        - method: GET
          path: "/v1/groups/{id}"
          handler: sub_features.05_groups.routes.get_group_route
        - method: PATCH
          path: "/v1/groups/{id}"
          handler: sub_features.05_groups.routes.update_group_route
        - method: DELETE
          path: "/v1/groups/{id}"
          handler: sub_features.05_groups.routes.delete_group_route
      ui_pages: []

    - key: iam.memberships
      number: 7
      label: Memberships
      description: User-org and user-workspace lnk rows. Assign / revoke / list. Immutable rows — revoke = DELETE.
      owns:
        schema: "03_iam"
        tables: ["40_lnk_user_orgs", "41_lnk_user_workspaces"]
        views: []
        seeds: []
      nodes:
        - key: iam.memberships.org.assign
          kind: effect
          handler: sub_features.07_memberships.nodes.iam_memberships_org_assign.MembershipsOrgAssign
          label: Assign User to Org
          description: Validates user + org exist, inserts lnk_user_orgs, emits audit iam.memberships.org.assigned.
          emits_audit: true
          version: 1
          tags: [identity, membership, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.memberships.org.revoke
          kind: effect
          handler: sub_features.07_memberships.nodes.iam_memberships_org_revoke.MembershipsOrgRevoke
          label: Revoke Org Membership
          description: Deletes lnk_user_orgs row by id; emits audit iam.memberships.org.revoked.
          emits_audit: true
          version: 1
          tags: [identity, membership, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.memberships.workspace.assign
          kind: effect
          handler: sub_features.07_memberships.nodes.iam_memberships_workspace_assign.MembershipsWorkspaceAssign
          label: Assign User to Workspace
          description: Validates user + workspace exist, derives org_id from workspace, inserts lnk_user_workspaces, emits audit.
          emits_audit: true
          version: 1
          tags: [identity, membership, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.memberships.workspace.revoke
          kind: effect
          handler: sub_features.07_memberships.nodes.iam_memberships_workspace_revoke.MembershipsWorkspaceRevoke
          label: Revoke Workspace Membership
          description: Deletes lnk_user_workspaces row by id; emits audit.
          emits_audit: true
          version: 1
          tags: [identity, membership, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
      routes:
        - method: GET
          path: /v1/org-members
          handler: sub_features.07_memberships.routes.list_org_memberships_route
        - method: POST
          path: /v1/org-members
          handler: sub_features.07_memberships.routes.create_org_membership_route
        - method: DELETE
          path: "/v1/org-members/{id}"
          handler: sub_features.07_memberships.routes.delete_org_membership_route
        - method: GET
          path: /v1/workspace-members
          handler: sub_features.07_memberships.routes.list_workspace_memberships_route
        - method: POST
          path: /v1/workspace-members
          handler: sub_features.07_memberships.routes.create_workspace_membership_route
        - method: DELETE
          path: "/v1/workspace-members/{id}"
          handler: sub_features.07_memberships.routes.delete_workspace_membership_route
      ui_pages: []

    - key: iam.credentials
      number: 8
      label: Credentials
      description: Argon2id password hashes for email_password users. Pepper from vault. Self-service password change via PATCH /v1/credentials/me — verifies current, hashes new, revokes sibling sessions.
      owns:
        schema: "03_iam"
        tables: ["22_dtl_credentials"]
        views: []
        seeds: []
      nodes: []
      routes:
        - method: PATCH
          path: /v1/credentials/me
          handler: sub_features.08_credentials.routes.change_my_password_route
      ui_pages: []

    - key: iam.sessions
      number: 9
      label: Sessions
      description: Opaque HMAC-SHA256 signed session tokens + self-service session management (list my sessions, revoke, extend). Signing key from vault (auth.session.signing_key_v1). TTL from vault config auth.session.ttl_days (default 7 days).
      owns:
        schema: "03_iam"
        tables: ["16_fct_sessions"]
        views: ["v_sessions"]
        seeds: []
      nodes: []
      routes:
        - method: GET
          path: /v1/sessions
          handler: sub_features.09_sessions.routes.list_my_sessions_route
        - method: GET
          path: "/v1/sessions/{id}"
          handler: sub_features.09_sessions.routes.get_my_session_route
        - method: PATCH
          path: "/v1/sessions/{id}"
          handler: sub_features.09_sessions.routes.patch_my_session_route
        - method: DELETE
          path: "/v1/sessions/{id}"
          handler: sub_features.09_sessions.routes.delete_my_session_route
      ui_pages: []

    - key: iam.auth
      number: 10
      label: Authentication
      description: Signup, signin, signout, OAuth (Google/GitHub), and the /me endpoint. Composes iam.users + iam.credentials + iam.sessions; emits iam.auth.* audit events.
      owns:
        schema: "03_iam"
        tables: []
        views: []
        seeds: []
      nodes:
        - key: iam.auth.signup
          kind: effect
          handler: sub_features.10_auth.nodes.iam_auth_signup.AuthSignup
          label: Sign Up
          description: Creates a new email_password user, hashes the password with the vault pepper, mints a session, and emits audit iam.auth.signup.
          emits_audit: true
          version: 1
          tags: [auth, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.auth.signin
          kind: effect
          handler: sub_features.10_auth.nodes.iam_auth_signin.AuthSignin
          label: Sign In
          description: Verifies an email_password credential against the stored argon2id hash; on success mints a session and emits audit iam.auth.signin (success or failure outcome).
          emits_audit: true
          version: 1
          tags: [auth, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.auth.validate_session
          kind: request
          handler: sub_features.10_auth.nodes.iam_auth_validate_session.AuthValidateSession
          label: Validate Session
          description: Decodes + verifies an opaque session token; returns the session row (with derived is_valid) or None. Read-only; no audit (request kind, gateway-eligible).
          emits_audit: false
          version: 1
          tags: [auth, read]
          execution: {timeout_ms: 2000, retries: 0, tx: caller}
        - key: iam.auth.revoke_session
          kind: effect
          handler: sub_features.10_auth.nodes.iam_auth_revoke_session.AuthRevokeSession
          label: Revoke Session
          description: Marks the session revoked_at and emits audit iam.auth.signout. Idempotent — revoking an already-revoked session returns revoked=False.
          emits_audit: true
          version: 1
          tags: [auth, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
      routes:
        - method: POST
          path: /v1/auth/signup
          handler: sub_features.10_auth.routes.signup_route
        - method: POST
          path: /v1/auth/signin
          handler: sub_features.10_auth.routes.signin_route
        - method: POST
          path: /v1/auth/signout
          handler: sub_features.10_auth.routes.signout_route
        - method: GET
          path: /v1/auth/me
          handler: sub_features.10_auth.routes.me_route
        - method: POST
          path: /v1/auth/google
          handler: sub_features.10_auth.routes.google_oauth_route
        - method: POST
          path: /v1/auth/github
          handler: sub_features.10_auth.routes.github_oauth_route
      ui_pages: []

    - key: iam.audit_coverage
      number: 21
      label: Audit Coverage
      description: Additional audit event keys registered for Plan 20-05 coverage closure. Not a sub-feature — events emitted by the relevant service functions.
      owns:
        schema: "03_iam"
        tables: []
        views: []
        seeds: []
      nodes: []
      routes: []
      ui_pages: []

    - key: iam.api_keys_extra
      number: 22
      label: API Keys Extended Events
      description: Additional audit event keys for API key operations added in Plan 20-06.
      owns:
        schema: "03_iam"
        tables: []
        views: []
        seeds: []
      nodes: []
      routes:
        - method: POST
          path: "/v1/api-keys/{key_id}/rotate"
          handler: sub_features.15_api_keys.routes.rotate_api_key_route
      ui_pages: []
    - key: iam.lockout
      number: 20
      label: Account Lockout
      description: Policy-driven sliding-window brute-force protection. Tracks failed auth attempts; on threshold breach locks the account for the configured duration. Emits iam.lockout.triggered and iam.lockout.cleared audit events.
      owns:
        schema: "03_iam"
        tables: ["30_fct_failed_auth_attempts", "31_fct_lockouts"]
        views: []
        seeds: []
      nodes: []
      routes: []
      ui_pages: []

    - key: iam.applications
      number: 6
      label: Applications
      description: External products or services using the API with scoped credentials. Always org-scoped.
      owns:
        schema: "03_iam"
        tables: ["15_fct_applications"]
        views: ["v_applications"]
        seeds: []
      nodes:
        - key: iam.applications.create
          kind: effect
          handler: sub_features.06_applications.nodes.iam_applications_create.ApplicationsCreate
          label: Create Application
          description: Creates org-scoped application with EAV code/label/description; emits audit iam.applications.created.
          emits_audit: true
          version: 1
          tags: [identity, write]
          execution: {timeout_ms: 5000, retries: 0, tx: caller}
        - key: iam.applications.get
          kind: control
          handler: sub_features.06_applications.nodes.iam_applications_get.ApplicationsGet
          label: Get Application
          description: Read-only cross-sub-feature lookup; returns flat v_applications row or None.
          emits_audit: false
          version: 1
          tags: [identity, read]
          execution: {timeout_ms: 2000, retries: 0, tx: caller}
      routes:
        - method: GET
          path: /v1/applications
          handler: sub_features.06_applications.routes.list_applications_route
        - method: POST
          path: /v1/applications
          handler: sub_features.06_applications.routes.create_application_route
        - method: GET
          path: "/v1/applications/{id}"
          handler: sub_features.06_applications.routes.get_application_route
        - method: PATCH
          path: "/v1/applications/{id}"
          handler: sub_features.06_applications.routes.update_application_route
        - method: DELETE
          path: "/v1/applications/{id}"
          handler: sub_features.06_applications.routes.delete_application_route
      ui_pages: []

    - key: iam.magic_link
      number: 11
      label: Magic Link
      description: Passwordless email magic link authentication. Tokens are HMAC-signed, 15-minute TTL.
      owns:
        schema: "03_iam"
        tables: ["19_fct_iam_magic_link_tokens"]
        views: []
        seeds: []
      nodes: []
      routes:
        - method: POST
          path: /v1/auth/magic-link/request
          handler: sub_features.11_magic_link.routes.request_magic_link_route
        - method: POST
          path: /v1/auth/magic-link/consume
          handler: sub_features.11_magic_link.routes.consume_magic_link_route
      ui_pages: []

    - key: iam.otp
      number: 12
      label: OTP / TOTP
      description: Email OTP and authenticator-app TOTP with backup codes (Plan 20-06).
      owns:
        schema: "03_iam"
        tables: ["23_fct_iam_otp_codes", "24_fct_iam_totp_credentials"]
        views: []
        seeds: []
      nodes: []
      routes: []
      ui_pages: []

    - key: iam.password_reset
      number: 14
      label: Password Reset
      description: HMAC-token password reset via email. Rate-limited; always returns 200 to avoid enumeration.
      owns:
        schema: "03_iam"
        tables: ["27_fct_iam_password_reset_tokens"]
        views: []
        seeds: []
      nodes: []
      routes: []
      ui_pages: []

    - key: iam.api_keys
      number: 15
      label: API Keys
      description: Long-lived opaque API keys (nk_ prefix) with configurable scopes and expiry.
      owns:
        schema: "03_iam"
        tables: ["28_fct_iam_api_keys"]
        views: []
        seeds: []
      nodes: []
      routes:
        - method: GET
          path: /v1/api-keys
          handler: sub_features.15_api_keys.routes.list_api_keys_route
        - method: POST
          path: /v1/api-keys
          handler: sub_features.15_api_keys.routes.create_api_key_route
        - method: GET
          path: "/v1/api-keys/{id}"
          handler: sub_features.15_api_keys.routes.get_api_key_route
        - method: PATCH
          path: "/v1/api-keys/{id}"
          handler: sub_features.15_api_keys.routes.update_api_key_route
        - method: DELETE
          path: "/v1/api-keys/{id}"
          handler: sub_features.15_api_keys.routes.delete_api_key_route
      ui_pages: []

    - key: iam.oidc_sso
      number: 25
      label: OIDC SSO
      description: Enterprise SSO via OpenID Connect with per-org provider config and PKCE flow.
      owns:
        schema: "03_iam"
        tables: ["30_fct_oidc_providers"]
        views: ["v_oidc_providers"]
        seeds: []
      nodes: []
      routes:
        - method: GET
          path: /v1/auth/oidc/{org_slug}/initiate
          handler: routes.oidc_initiate
        - method: GET
          path: /v1/auth/oidc/{org_slug}/callback
          handler: routes.oidc_callback
        - method: GET
          path: /v1/iam/oidc-providers
          handler: sub_features.20_oidc_sso.routes.list_oidc_providers
        - method: POST
          path: /v1/iam/oidc-providers
          handler: sub_features.20_oidc_sso.routes.create_oidc_provider
        - method: DELETE
          path: "/v1/iam/oidc-providers/{provider_id}"
          handler: sub_features.20_oidc_sso.routes.delete_oidc_provider
      ui_pages: []

    - key: iam.dsar
      number: 29
      label: GDPR DSAR
      description: Operator-triggered data subject access (export) and erasure (delete) jobs. Background worker transitions jobs through requested → in_progress → completed/failed; export payloads are AES-256-GCM encrypted with a vault-managed DEK and stored in dtl_dsar_payloads.
      owns:
        schema: "03_iam"
