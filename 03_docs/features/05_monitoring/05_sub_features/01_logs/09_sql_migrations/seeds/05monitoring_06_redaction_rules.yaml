# Global default redaction rules. org_id = NULL → applies to all orgs.
# Rules are executed in priority order (lower first). Regex rules use Python
# `re` syntax. Denylist rules match attribute keys case-insensitively.
schema: "05_monitoring"
table: "12_fct_monitoring_redaction_rules"
rows:
  - code: credit_card
    org_id: null
    pattern: "\\b(?:\\d[ -]*?){13,19}\\b"
    applies_to: both
    kind: regex
    replacement: "[REDACTED_CC]"
    is_active: true
    priority: 10

  - code: aws_access_key
    org_id: null
    pattern: "AKIA[A-Z0-9]{16}"
    applies_to: both
    kind: regex
    replacement: "[REDACTED_AWS_KEY]"
    is_active: true
    priority: 20

  - code: jwt_token
    org_id: null
    pattern: "eyJ[A-Za-z0-9\\-_=]+\\.eyJ[A-Za-z0-9\\-_=]+\\.[A-Za-z0-9\\-_.+/=]*"
    applies_to: both
    kind: regex
    replacement: "[REDACTED_JWT]"
    is_active: true
    priority: 30

  - code: bearer_token
    org_id: null
    pattern: "Bearer [A-Za-z0-9\\-._~+/]+=*"
    applies_to: both
    kind: regex
    replacement: "Bearer [REDACTED]"
    is_active: true
    priority: 40

  - code: password_kv
    org_id: null
    pattern: "(?i)password\\s*=\\s*\\S+"
    applies_to: body
    kind: regex
    replacement: "password=[REDACTED]"
    is_active: true
    priority: 50

  - code: deny_password
