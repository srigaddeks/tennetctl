# Pin the compose project name so it does not depend on the directory the
# file lives in. Without this, moving docker-compose.yml between folders
# orphans existing containers under the old project name.
name: tennetctl

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 17 — primary data store
  # All tennetctl state lives here. Three roles: read, write, admin.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: tennetctl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tennetctl
      POSTGRES_USER: tennetctl_admin
      POSTGRES_PASSWORD: tennetctl_admin_dev
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tennetctl_admin -d tennetctl"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # Valkey 8 — Redis-compatible cache and rate-limiting
  # Used for: API rate limits, session token cache, short-lived ephemeral state.
  # Valkey is the open-source Redis fork maintained by the Linux Foundation.
  # ---------------------------------------------------------------------------
  valkey:
    image: valkey/valkey:8
    container_name: tennetctl-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # MinIO — S3-compatible object storage
  # Used for: file uploads, audit log archives, secret version snapshots.
  # Console at http://localhost:9001 (minioadmin / minioadmin_dev)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: tennetctl-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------------
  # NATS 2.10 with JetStream — event bus and message streaming
  # Used for: cross-module events (R-002), high-volume ingest, audit fan-out.
  # JetStream provides durable message streams for guaranteed delivery.
  # Monitor at http://localhost:8222
  # ---------------------------------------------------------------------------
  nats:
    image: nats:2.10
    container_name: tennetctl-nats
    restart: unless-stopped
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    # NOTE: --max_payload is config-file-only on nats-server. The default
    # 1MB is fine; raise it via a mounted nats.conf if we ever need to.
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "--http_port=8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for kbio behavioral embeddings
  # HTTP API at http://localhost:6333, gRPC at 6334.
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: tennetctl-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz | grep -q passed || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10


volumes:
  postgres_data:
    driver: local
  valkey_data:
    driver: local
  minio_data:
    driver: local
  nats_data:
    driver: local
  qdrant_data:
    driver: local
